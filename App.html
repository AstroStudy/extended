<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyJHora Cloud Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; }
        .app-wrapper { display: flex; flex-direction: column; height: 100vh; padding: 8px; gap: 8px; }

        header { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 10px; background: #1e293b; padding: 12px; border-radius: 8px; border: 1px solid #334155;
        }
        .field { display: flex; flex-direction: column; gap: 3px; }
        label { font-size: 0.65rem; font-weight: 700; color: #38bdf8; text-transform: uppercase; }
        input { background: #0f172a; border: 1px solid #475569; color: white; padding: 5px; border-radius: 4px; font-size: 0.85rem; }

        .btn-group { display: flex; gap: 5px; align-self: end; }
        button { padding: 8px 12px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.7rem; }
        .btn-sync { background: #475569; color: white; }
        .btn-run { background: #38bdf8; color: #0f172a; }
        .btn-save { background: #10b981; color: white; width: 100%; margin-top: 5px; }

        main { flex-grow: 1; display: flex; flex-direction: column; background: #020617; border-radius: 8px; border: 1px solid #1e293b; overflow: hidden; }
        .split-container { display: flex; flex: 1; overflow: hidden; }
        #output { flex: 2; padding: 15px; overflow-y: auto; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; border-right: 1px solid #1e293b; color: #cbd5e1; }
        .notes-panel { flex: 1; display: flex; flex-direction: column; padding: 10px; background: #0f172a; min-width: 280px; }
        textarea { flex-grow: 1; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; padding: 10px; border-radius: 4px; font-size: 0.8rem; resize: none; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <div class="field"><label>Name / JHD ID</label><input type="text" id="userName" placeholder="Search..."></div>
        <div class="field"><label>Date & Time</label><input type="datetime-local" id="birthDatetime"></div>
        <div class="field"><label>Latitude</label><input type="number" step="any" id="lat"></div>
        <div class="field"><label>Longitude</label><input type="number" step="any" id="lng"></div>
        <div class="btn-group">
            <button class="btn-sync" onclick="syncFromCache()">SYNC JHD</button>
            <button class="btn-run" onclick="runPyJHora()">RUN PYJHORA</button>
        </div>
    </header>

    <main>
        <div class="split-container">
            <div id="output">Waiting for input... Results from PyJHora will appear here.</div>
            <div class="notes-panel">
                <label style="font-size: 0.65rem; color: #38bdf8; margin-bottom: 5px;">TECHNICAL CACHE / NOTES</label>
                <textarea id="chartNotes" placeholder="Notes are synced with your JHD file cache..."></textarea>
                <button class="btn-save" onclick="saveToSupabase()">SAVE TO CLOUD</button>
            </div>
        </div>
    </main>
</div>

<script>
    const SB_URL = "YOUR_SUPABASE_URL";
    const SB_KEY = "YOUR_SUPABASE_ANON_KEY";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    async function syncFromCache() {
        const name = document.getElementById('userName').value;
        const { data } = await supabase.from('profiles').select('*').eq('name_id', name).single();
        if (data) {
            document.getElementById('birthDatetime').value = data.birth_time;
            document.getElementById('lat').value = data.lat;
            document.getElementById('lng').value = data.lng;
            document.getElementById('chartNotes').value = data.notes || "";
        }
    }

    async function runPyJHora() {
        const dtValue = document.getElementById('birthDatetime').value;
        if (!dtValue) return alert("Please select date and time.");

        const dt = new Date(dtValue);
        const inputData = {
            name: document.getElementById('userName').value,
            year: dt.getFullYear(),
            month: dt.getMonth() + 1,
            day: dt.getDate(),
            hour: dt.getHours(),
            minute: dt.getMinutes(),
            lat: parseFloat(document.getElementById('lat').value),
            lon: parseFloat(document.getElementById('lng').value)
        };

        document.getElementById('output').innerText = "Connecting to Supabase Python Engine...";

        // Replace with your actual Edge Function URL
        const FUNC_URL = `${SB_URL}/functions/v1/pyjhora-calc`;

        try {
            const response = await fetch(FUNC_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SB_KEY}` },
                body: JSON.stringify(inputData)
            });
            const result = await response.json();
            document.getElementById('output').innerText = JSON.stringify(result, null, 2);
        } catch (e) {
            document.getElementById('output').innerText = "Error: " + e.message;
        }
    }

    async function saveToSupabase() {
        const profile = {
            name_id: document.getElementById('userName').value,
            birth_time: document.getElementById('birthDatetime').value,
            lat: document.getElementById('lat').value,
            lng: document.getElementById('lng').value,
            notes: document.getElementById('chartNotes').value
        };
        const { error } = await supabase.from('profiles').upsert(profile);
        alert(error ? "Error: " + error.message : "Saved to Supabase Cache");
    }
</script>
</body>
</html>
